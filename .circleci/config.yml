version: 2.1

jobs:
  cortex-code-scan:
    docker:
      - image: cimg/node:22.17.0
    environment:
      CORTEX_API_URL: https://api-pcscortexcloud.xdr.us.paloaltonetworks.com
    steps:
      - checkout
      - run:
          name: Download cortexcli
          command: |
            set -x
            crtx_resp=$(curl -f "${CORTEX_API_URL}/public_api/v1/get_cli_download_url" \
              -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
              -H "Authorization: ${CORTEX_API_KEY}")
            if ! echo "$crtx_resp" | jq -e . > /dev/null 2>&1; then
              echo "Error: API response is not valid JSON: $crtx_resp"
              exit 1
            fi
            crtx_url=$(echo "$crtx_resp" | jq -r ".signed_url")
            if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
              echo "Error: Could not extract signed_url from response: $crtx_resp"
              exit 1
            fi
            curl -f -o cortexcli "$crtx_url"
            chmod +x cortexcli
            ./cortexcli --version
      - run:
          name: Run Cortex CLI Code Scan
          command: |
            ./cortexcli \
              --api-base-url "${CORTEX_API_URL}" \
              --api-key "${CORTEX_API_KEY}" \
              --api-key-id "${CORTEX_API_KEY_ID}" \
              code scan \
              --directory "$(pwd)" \
              --repo-id "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}" \
              --branch "${CIRCLE_BRANCH}" \
              --source "CIRCLE_CI" \
              --create-repo-if-missing

workflows:
  cortex-scan-workflow:
    jobs:
      - cortex-code-scan:
          context: cortex-secrets